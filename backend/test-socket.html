<!DOCTYPE html>
<html>
<head>
  <title>OptiHive Socket Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <h2>🐝 OptiHive Socket Test</h2>

  <div>
    <h3>1. Connexion</h3>
    <input id="token" placeholder="Colle ton JWT token ici" style="width:500px"/>
    <button onclick="connect()">Se connecter</button>
    <p id="status">❌ Non connecté</p>
  </div>

  <div>
    <h3>2. Rejoindre un projet</h3>
    <input id="projectId" placeholder="Project ID" style="width:300px"/>
    <button onclick="joinProject()">Rejoindre</button>
    <p id="roomStatus"></p>
  </div>

  <div>
    <h3>3. Envoyer un message</h3>
    <input id="message" placeholder="Ton message..." style="width:300px"/>
    <button onclick="sendMessage()">Envoyer</button>
  </div>

  <div>
    <h3>Messages reçus :</h3>
    <div id="messages" style="border:1px solid #ccc; padding:10px; height:200px; overflow-y:auto"></div>
  </div>

  <script>
    let socket;
    let currentProjectId;

    function connect() {
      const token = document.getElementById('token').value;

      socket = io('http://localhost:3000', {
        auth: { token }
      });

      socket.on('connect', () => {
        document.getElementById('status').innerHTML = '✅ Connecté ! Socket ID: ' + socket.id;
      });

      socket.on('connect_error', (err) => {
        document.getElementById('status').innerHTML = '❌ Erreur: ' + err.message;
      });

      socket.on('newMessage', (data) => {
        const div = document.getElementById('messages');
        div.innerHTML += `<p><b>${data.sender.name}</b>: ${data.message} <small>(${new Date(data.timestamp).toLocaleTimeString()})</small></p>`;
      });

      socket.on('userTyping', (data) => {
        document.getElementById('roomStatus').innerHTML = `✏️ ${data.name} est en train d'écrire...`;
        setTimeout(() => document.getElementById('roomStatus').innerHTML = '', 2000);
      });

      socket.on('joinedProject', (data) => {
        document.getElementById('roomStatus').innerHTML = '✅ ' + data.message;
      });
    }

    function joinProject() {
      currentProjectId = document.getElementById('projectId').value;
      socket.emit('joinProject', currentProjectId);
    }

    function sendMessage() {
      const message = document.getElementById('message').value;
      socket.emit('sendMessage', {
        projectId: currentProjectId,
        message
      });
      document.getElementById('message').value = '';
    }
  </script>
</body>
</html>
